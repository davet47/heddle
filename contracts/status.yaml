name: status
signature: "(root: Path, store: Store) -> dict"
deps: [Store, verification_key, impl_hash, HashloomError]
invariants:
  - dirty means no current green — missing, stale, failed, or unresolvable toolchain all count
  - spec-only contracts are never dirty; they have nothing to verify
  - reports the resolved interpreter, cache hit-rate, recheck waste, and cumulative token counters
  - inferred contracts are listed as the human review queue, key absent when none
tests:
  - tests/test_verify.py::test_status_reports_dirty_and_hit_rate
  - tests/test_verify.py::test_status_reports_wasted_rechecks
  - tests/test_store_and_api.py::test_status_lists_inferred_including_spec_only
impl: src/hashloom/api.py::status
status: confirmed
