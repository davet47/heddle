name: get_contract
signature: "(root: Path, store: Store, name: str) -> dict"
deps: [Store, HashloomError]
invariants:
  - the ~300-token context packet — contract body, 12-char hash, one-line dep signatures, caller list
  - inferred deps carry an advisory inferred flag; confirmed ones carry no extra key
  - an unknown name errors with a nearest-match hint, never a KeyError
tests:
  - tests/test_store_and_api.py::test_get_contract_packet
  - tests/test_store_and_api.py::test_get_contract_unknown_suggests_nearest
  - tests/test_store_and_api.py::test_get_contract_carries_status_and_flags_inferred_deps
impl: src/hashloom/api.py::get_contract
status: confirmed
